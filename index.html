<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#E53935" />

  <!-- SEO Meta Tags -->
  <meta name="description" content="PizzaFlow — O melhor delivery de pizza da cidade. Peça agora e receba em até 40 minutos com rastreamento em tempo real." />
  <meta name="keywords" content="pizza, delivery, pedido online, pizzaria, pizzaflow" />
  <meta name="author" content="PizzaFlow" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="PizzaFlow — Delivery de Pizza" />
  <meta property="og:description" content="O melhor delivery de pizza da cidade. Peça agora!" />
  <meta property="og:image" content="/icons/icon-512.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PizzaFlow — Delivery de Pizza" />
  <meta name="twitter:description" content="O melhor delivery de pizza da cidade." />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PizzaFlow" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="PizzaFlow" />
  <meta name="msapplication-TileColor" content="#E53935" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Poppins + Inter -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Design System Styles (order matters) -->
  <link rel="stylesheet" href="/src/css/design-system.css" />
  <link rel="stylesheet" href="/src/css/animations.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/layout.css" />

  <title>PizzaFlow — Delivery de Pizza</title>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       APP SHELL
       Root container managed by router + components
       ═══════════════════════════════════════════ -->
  <div id="app" role="application" aria-label="PizzaFlow App">

    <!-- SPLASH SCREEN — shown during initial load -->
    <div id="splash-screen" class="splash-screen" aria-hidden="false">
      <div class="splash-content">
        <div class="splash-logo-wrapper">
          <div class="splash-icon" aria-label="Pizza">🍕</div>
          <h1 class="splash-title">PizzaFlow</h1>
          <p class="splash-tagline">Sabor que chega até você</p>
        </div>
        <div class="splash-loader" role="progressbar" aria-label="Carregando...">
          <div class="splash-loader-track">
            <div class="splash-loader-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT — pages are injected here by the router -->
    <main
      id="main-content"
      class="main-content"
      role="main"
      aria-label="Conteúdo principal"
      tabindex="-1"
    ></main>

    <!-- BOTTOM NAVIGATION — persistent across pages -->
    <nav
      id="bottom-nav"
      class="bottom-nav"
      role="navigation"
      aria-label="Navegação principal"
    ></nav>

    <!-- FLOATING CART BUTTON — appears when cart has items -->
    <div
      id="floating-cart"
      class="floating-cart-container"
      aria-label="Carrinho de compras"
    ></div>

    <!-- TOAST NOTIFICATIONS — stacked notifications container -->
    <div
      id="toast-container"
      class="toast-container"
      role="region"
      aria-live="polite"
      aria-atomic="false"
      aria-label="Notificações"
    ></div>

    <!-- DIALOG / MODAL — overlays -->
    <div
      id="dialog-container"
      class="dialog-container"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
    ></div>

    <!-- SEARCH OVERLAY — full-screen search experience -->
    <div
      id="search-overlay"
      class="search-overlay"
      role="search"
      aria-label="Busca de produtos"
      aria-hidden="true"
    ></div>

    <!-- PWA INSTALL PROMPT — custom install banner -->
    <div
      id="pwa-install-prompt"
      class="pwa-install-prompt"
      role="banner"
      aria-label="Instalar PizzaFlow"
      hidden
    ></div>

  </div><!-- /#app -->

  <!-- App Entry Point -->
  <script type="module" src="/src/main.js"></script>

</body>
</html>
